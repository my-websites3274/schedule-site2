function parseTime(timeStr) {
if (!timeStr || typeof timeStr !== 'string') return null;
const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
if (!match) return null;

let hours = parseInt(match[1]);
const minutes = parseInt(match[2]);
const period = match[3].toUpperCase();

if (period === 'PM' && hours !== 12) hours += 12;
if (period === 'AM' && hours === 12) hours = 0;

return hours * 60 + minutes;
}

function renderSchedule(day) {
const container = document.getElementById('schedule-container');
const noClasses = document.getElementById('no-classes');
const classes = scheduleData[day] || [];

container.innerHTML = '';

if (classes.length === 0) {
container.classList.add('hidden');
noClasses.classList.remove('hidden');
return;
}

container.classList.remove('hidden');
noClasses.classList.add('hidden');

const now = new Date();
const currentTime = now.getHours() * 60 + now.getMinutes();
const isToday = now.getDay() === day;

classes.forEach((cls) => {
const card = document.createElement('div');
card.className = 'class-card bg-white/10 backdrop-blur-sm rounded-2xl p-4 border border-white/10 hover:bg-white/15 transition-all duration-200';

let isCurrentClass = false;
if (isToday) {
const classStartTime = parseTime(cls.time);
const classEndTime = parseTime(cls.endTime);

if (classStartTime !== null && classEndTime !== null && currentTime >= classStartTime && currentTime < classEndTime) {
isCurrentClass = true;
card.classList.add('current-class');
}
}

card.innerHTML = `

container.appendChild(card);

btn.classList.remove('active', 'bg-indigo-500');
btn.classList.add('bg-white/10');

});
